name: Build standalone executables

# Every commit to main builds a binary for each OS and refreshes the rolling
# "nightly" pre-release (a stable download link, no login needed). Pushing a
# version tag (`git tag v1.0 && git push --tags`) instead publishes a permanent
# Release with the binaries attached. `workflow_dispatch` builds artifacts only.

on:
  push:
    branches: ["main"]   # every commit → build + refresh the nightly pre-release
    tags: ["v*"]         # version tag → publish a permanent Release
  workflow_dispatch:

permissions:
  contents: write

# A newer push to the same ref cancels an in-progress build instead of
# queueing another full 3-OS run.
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      PYTHONUTF8: "1"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install test dependencies
        run: pip install -r requirements-dev.txt
      - name: Run tests
        run: pytest -q

  build:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            asset: chinese-anki-windows.exe
            built: dist/chinese-anki.exe
          - os: macos-latest
            asset: chinese-anki-macos
            built: dist/chinese-anki
          - os: ubuntu-latest
            asset: chinese-anki-linux
            built: dist/chinese-anki
    runs-on: ${{ matrix.os }}
    env:
      # Force UTF-8 stdio so the ✓/⚠ glyphs we print don't crash the cp1252
      # console on the Windows runner.
      PYTHONUTF8: "1"
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: pip install -r requirements-build.txt

      - name: Fetch bundled CJK fonts
        run: python fetch_fonts.py

      - name: Fetch bundled hanzi-writer assets
        run: python fetch_hanzi.py

      - name: Build executable
        run: pyinstaller --noconfirm chinese-anki.spec

      - name: Normalize binary name
        shell: bash
        run: cp "${{ matrix.built }}" "${{ matrix.asset }}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}

      - name: Attach to tagged release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: ${{ matrix.asset }}

  # Refresh the rolling "nightly" pre-release from the latest main build.
  nightly:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download all built binaries
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Move the nightly tag to this commit
        run: |
          git tag -f nightly
          git push -f origin nightly

      - name: Publish/refresh the nightly pre-release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: nightly
          name: Nightly build
          prerelease: true
          body: >
            Automatically built from the latest commit on `main`
            (${{ github.sha }}). For the latest tested release, see the tagged
            releases instead.
          files: artifacts/*
